name: CI Fast

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Sync workspace
        run: go work sync

      - name: Run all tests
        run: |
          set +e
          EXIT_CODE=0

          for mod in \
            libs/authz \
            libs/eventbus \
            libs/retry \
            libs/httpclient \
            libs/featureflags \
            libs/observability \
            apps/api-gateway \
            apps/billing-service \
            apps/auth-service \
            apps/orders-service \
            apps/notifications-service \
            apps/search-service \
            apps/worker-ingest \
            apps/worker-reconcile; do

            echo "::group::Testing $mod"
            cd "$GITHUB_WORKSPACE/$mod"
            if go test -v -count=1 ./... 2>&1; then
              echo "PASS: $mod"
            else
              echo "::error::FAIL: $mod"
              EXIT_CODE=1
            fi
            echo "::endgroup::"
          done

          exit $EXIT_CODE

      - name: Build all modules
        if: success()
        run: |
          for mod in \
            libs/authz \
            libs/eventbus \
            libs/retry \
            libs/httpclient \
            libs/featureflags \
            libs/observability \
            apps/api-gateway \
            apps/billing-service \
            apps/auth-service \
            apps/orders-service \
            apps/notifications-service \
            apps/search-service \
            apps/worker-ingest \
            apps/worker-reconcile; do

            echo "Building $mod..."
            cd "$GITHUB_WORKSPACE/$mod"
            go build ./...
          done
          echo "All modules built successfully."
